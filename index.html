<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cultured Pour</title>
  </head>
  <body>
    <style>
      html {
        --color: #ebcc90;

        background: black;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        
        font-size: 20px;
        color: white;
      }
      main {
        display: flex;
        align-items: center;
        flex-direction: column;
        gap: 1em;
      }

      input,
      button {
        font-size: 1em;
        color: inherit;
        padding: 0.5em;
      }

      #updates-form #email {
        background: transparent;
        border: 1px solid var(--color);
        border-radius: 4px;
      }
      #updates-form button {
        background: transparent;
        border: 1px solid var(--color);
        border-radius: 1em;
      }
    </style>
    <main>
      <h1 hidden>Cultured Pour</h1>
      <img src="assets/logo.svg" alt="Cultured Pour Logo" width="320" height="180" />

      <form id="updates-form" action="" method="get">
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
        />
        <button type="submit">Sign up</button>
      </form>
      <noscript>Please enable JavaScript to submit the email updates form.</noscript>
      <div id="updates-message" role="status" aria-live="polite" tabindex="-1" hidden>
        Thanks for signing up. We will share updates soon.
      </div>
    </main>
    <script>
      const updatesForm = document.getElementById("updates-form");
      const updatesMessage = document.getElementById("updates-message");
      updatesForm.addEventListener("submit", (event) => {
        event.preventDefault();
        updatesMessage.hidden = false;
        updatesForm.reset();
        updatesMessage.focus();
      });
    </script>
  </body>
</html>
